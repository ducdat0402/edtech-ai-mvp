<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt lại mật khẩu – EdTech AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #16162a;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-icon {
      display: inline-flex;
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .logo h1 {
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 22px;
      letter-spacing: 2px;
    }
    h2 { color: #f0f0f0; font-size: 20px; margin-bottom: 8px; text-align: center; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 28px; }
    label { display: block; color: #aaa; font-size: 13px; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #1e1e3a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #7c3aed; }
    .field + .field { margin-top: 16px; }
    .btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; }
    .msg.ok { background: rgba(0,212,135,0.15); color: #00d487; border: 1px solid rgba(0,212,135,0.3); }
    .msg.err { background: rgba(255,60,90,0.15); color: #ff3c5a; border: 1px solid rgba(255,60,90,0.3); }
    .back { display: block; text-align: center; margin-top: 20px; color: #00d4ff; text-decoration: none; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>EDTECH AI</h1>
    </div>

    <div id="formSection">
      <h2>Đặt lại mật khẩu</h2>
      <p class="subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>

      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="field">
          <label for="pw1">Mật khẩu mới</label>
          <input type="password" id="pw1" placeholder="Ít nhất 6 ký tự" required minlength="6">
        </div>
        <div class="field">
          <label for="pw2">Xác nhận mật khẩu</label>
          <input type="password" id="pw2" placeholder="Nhập lại mật khẩu" required minlength="6">
        </div>
        <button class="btn" type="submit" id="submitBtn">Đặt lại mật khẩu</button>
      </form>
      <div id="msgBox" class="msg hidden"></div>
    </div>

    <div id="successSection" class="hidden" style="text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">✅</div>
      <h2>Thành công!</h2>
      <p class="subtitle">Mật khẩu đã được đặt lại. Bạn có thể đăng nhập bằng mật khẩu mới trong app.</p>
    </div>

    <a class="back" href="/">← Quay lại trang chủ</a>
  </div>

  <script>
    const API_BASE = 'https://edtech-ai-backend-tbq7.onrender.com/api/v1';

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    async function handleReset(e) {
      e.preventDefault();
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      const msgBox = document.getElementById('msgBox');
      const btn = document.getElementById('submitBtn');

      msgBox.classList.add('hidden');

      if (pw1 !== pw2) {
        msgBox.textContent = 'Mật khẩu không khớp!';
        msgBox.className = 'msg err';
        return;
      }

      const token = getToken();
      if (!token) {
        msgBox.textContent = 'Link không hợp lệ (thiếu token).';
        msgBox.className = 'msg err';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        const res = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw1 }),
        });
        const data = await res.json();

        if (res.ok) {
          document.getElementById('formSection').classList.add('hidden');
          document.getElementById('successSection').classList.remove('hidden');
        } else {
          msgBox.textContent = data.message || 'Có lỗi xảy ra';
          msgBox.className = 'msg err';
        }
      } catch (err) {
        msgBox.textContent = 'Không kết nối được server. Thử lại sau.';
        msgBox.className = 'msg err';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đặt lại mật khẩu';
      }
    }

    if (!getToken()) {
      document.getElementById('formSection').innerHTML = `
        <h2>Link không hợp lệ</h2>
        <p class="subtitle">Link đặt lại mật khẩu không đúng hoặc đã hết hạn.<br>Vui lòng yêu cầu lại từ ứng dụng.</p>
      `;
    }
  </script>
</body>
</html>
