<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang cập nhật hệ thống</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0b12;
      color: #f5f3ff;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: #151322;
      border: 1px solid #2e2948;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .message {
      margin: 0;
      font-size: 18px;
      line-height: 1.65;
      color: #ddd6fe;
    }

    .reload-btn {
      margin-top: 22px;
      border: 0;
      border-radius: 12px;
      background: #8b5cf6;
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 20px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    .reload-btn:hover {
      opacity: 0.95;
    }

    .reload-btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="message">
      Hệ thống đang được phù phép — abracadabra xong là xịn ngay, xứng đáng với sự chờ đợi của bạn.
      <br />
      Quay lại sau ít phút bạn nhé.
    </p>
    <button class="reload-btn" type="button" onclick="window.location.reload()">
      Tải lại trang
    </button>
  </main>
</body>
</html>
